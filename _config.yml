# Hexo Configuration
# 文档: https://hexo.io/docs/configuration.html
# 源码: https://github.com/hexojs/hexo/

# Site
title: 刘涛的博客
subtitle: "记录探索与成长"
description: "技术分享 | 生活记录 | 个人作品集"
author: 刘涛
language: zh-CN
timezone: Asia/Shanghai

# URL
## If your site is put in a subdirectory, set url as 'http://example.com/child' and root as '/child/'
url: https://toddblo124578.vercel.app
root: /
permalink: :title/
permalink_defaults:
pretty_urls:
  trailing_index: false
  trailing_html: false

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 12
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: butterfly

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: git
  repo: https://github.com/Todd124578/blog.git
  branch: main
  token: ${{ secrets.GH_TOKEN }}

# Search
search:
  path: search.xml
  field: post
  format: html
  limit: 10000

# Sitemap
sitemap:
  path: sitemap.xml
  template: ./scaffold/sitemap.xml
  rel: false

# RSS
feed:
  type: atom
  path: atom.xml
  limit: 20
  hub:
  content: true

# Markdown render
marked:
  prependRoot: true
  postAsset: true
  highlight:
    enable: true
    lineNumber: true
    highlightjs: true

# Local search
local_search:
  enable: true
  labels:
    skip: '跳过'
    toc: '目录'
    afflink: 'afflink'
    readmore: '阅读全文'
    copy: '复制'
    loading: '加载中...'
  result_top: false
  pagesize: 10

# Aplayer (音乐播放器)
aplayer:
  enable: true
  autoplay: false
  theme: '#b9d769'
  loop: 'all'
  order: 'random'
  preload: 'auto'
  volume: 0.7
  mutex: true
  lrcType: 3
  listFolded: false
  listMaxHeight: 340
  audio:
    - name: 歌曲名
      artist: 艺术家
      url: 音乐URL
      cover: 封面URL
      lrc: 歌词URL(可选)

# Math (数学公式)
mathjax:
  enable: false
  cdn: //cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  tags: none # or 'ams' or 'all'
  mathjax:
    version: 3.1.4
    lineNumbers: true
  config:
    tex:
      inlineMath:
        - ['$', '$']
        - ['\\(', '\\)']
      displayMath:
        - ['$$', '$$']
        - ['\\[', '\\]']

# Pangu (中文排版)
pangu:
  enable: false
  field: post
  cdns:
    - //cdn.jsdelivr.net/npm/pangu@4.0.7/dist/browser/pangu.min.js

# Comments
comments:
  enable: true
  type: giscus
  giscus:
    repo: Todd124578/blog
    repoId: R_kgDxxxxxxxx
    category: Announcements
    categoryId: DIC_kwDxxxxxxxx
    mapping: pathname
    reactionsEnabled: 1
    emitMetadata: 0
    inputPosition: top
    theme: dark
    lang: zh-CN
    lazyLoading: true

# Social Links
social:
  GitHub: https://github.com/Todd124578 || fab fa-github
  Email: mailto:hello@example.com || fa fa-envelope
  Twitter: https://twitter.com/Todd124578 || fab fa-twitter

# Website count
busuanzi:
  enable: true
  site_uv: true
  site_pv: true
  page_pv: true
  offset: 1

# QR code
qrcode:
  enable: true
  field: site
  source: "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://your-domain.vercel.app"
  canvas: true
  download: false
  hiding: true
  fgColor: "#000000"
  bgColor: "#ffffff"

# Tab category count
tab_category_count: 8
tab_tag_count: 10

# Article info
post_meta:
  date_type: created
  updated_type: updated
  categories: true
  tags: true
  devider: '|'

# Post wordcount
wordcount:
  enable: true
  post_wordcount: true
  min2read: true
  total_count: true

# Netease Music
music:
  enable: false
  server: netease
  type: playlist
  id: 503838461
  fixed: false
  autoplay: false
  loop: all
  order: random
  preload: auto
  volume: 0.7
  lrcType: 0

# Cookie consent
cookieconsent:
  enable: true
  theme: wire
  palette:
    popup:
      background: "#1a1a1a"
      text: "#f1f1f1"
    button:
      background: "#e8c547"
      text: "#000000"
  content:
    dismiss: "知道了!"
    link: "了解更多"
    message: "此网站使用Cookie来改善您的体验。"