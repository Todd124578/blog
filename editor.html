<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客管理 - 刘涛的博客</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* 编辑器额外样式 */
        .editor-wrapper {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: var(--space-lg);
        }

        @media (max-width: 1024px) {
            .editor-wrapper {
                grid-template-columns: 1fr;
            }
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: var(--space-sm);
            background: var(--bg-secondary);
            border: 1px solid var(--bg-glass-border);
            border-bottom: none;
            border-radius: var(--radius-md) var(--radius-md) 0 0;
        }

        .toolbar-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: var(--bg-glass);
            border: 1px solid var(--bg-glass-border);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
        }

        .toolbar-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .toolbar-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .toolbar-separator {
            width: 1px;
            height: 36px;
            background: var(--bg-glass-border);
            margin: 0 6px;
        }

        .content-editor {
            min-height: 400px;
            border-radius: 0 0 var(--radius-md) var(--radius-md);
        }

        .content-editor:focus {
            outline: none;
        }

        .content-editor img {
            max-width: 100%;
            border-radius: var(--radius-md);
            margin: var(--space-sm) 0;
        }

        .content-editor video,
        .content-editor audio {
            width: 100%;
            border-radius: var(--radius-md);
            margin: var(--space-sm) 0;
        }

        /* 预览面板 */
        .preview-panel {
            position: sticky;
            top: calc(var(--nav-height) + var(--space-md));
        }

        .preview-card {
            background: var(--bg-card);
            border: 1px solid var(--bg-glass-border);
            border-radius: var(--radius-lg);
            padding: var(--space-md);
        }

        .preview-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: var(--space-sm);
        }

        .preview-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--space-sm);
        }

        .stat-item {
            background: var(--bg-secondary);
            padding: var(--space-sm);
            border-radius: var(--radius-md);
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* 配置管理 */
        .config-section {
            margin-top: var(--space-lg);
        }

        .config-card {
            background: var(--bg-card);
            border: 1px solid var(--bg-glass-border);
            border-radius: var(--radius-lg);
            padding: var(--space-md);
        }

        .config-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-sm) 0;
            border-bottom: 1px solid var(--bg-glass-border);
        }

        .config-item:last-child {
            border-bottom: none;
        }

        .config-info h4 {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .config-info p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .config-color {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--bg-glass-border);
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: var(--transition);
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-md);
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-glass);
            border: 1px solid var(--bg-glass-border);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
        }

        .modal-close:hover {
            background: #ef4444;
            border-color: #ef4444;
            color: white;
        }

        /* 设置面板 */
        .settings-panel {
            display: none;
        }

        .settings-panel.active {
            display: block;
        }

        .category-color-picker {
            display: flex;
            gap: var(--space-sm);
            flex-wrap: wrap;
            margin-top: var(--space-sm);
        }

        .color-option {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: var(--transition);
        }

        .color-option:hover,
        .color-option.selected {
            transform: scale(1.1);
            border-color: white;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Tao's Blog</a>
            <div style="display: flex; gap: 8px;">
                <a href="index.html" class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.85rem;">预览博客</a>
                <button class="menu-toggle" aria-label="Toggle menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="editor.html" class="active">管理</a></li>
            </ul>
        </div>
    </nav>

    <!-- 编辑器主体 -->
    <main class="editor-container">
        <div class="editor-header">
            <h1 class="editor-title">博客管理</h1>
            <div style="display: flex; gap: 8px;">
                <button class="btn btn-secondary" onclick="showSettings()">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                        <path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
                    </svg>
                    设置
                </button>
            </div>
        </div>

        <!-- 设置面板 -->
        <div class="settings-panel" id="settingsPanel">
            <div class="config-card">
                <h3 style="font-size: 1.1rem; font-weight: 700; margin-bottom: 16px;">分类管理</h3>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 16px;">点击分类可以编辑颜色和背景图</p>

                <div id="categoryList">
                    <!-- 分类列表将通过JS生成 -->
                </div>

                <button class="btn" style="margin-top: 16px; width: 100%;" onclick="showAddCategory()">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                    </svg>
                    添加分类
                </button>
            </div>
        </div>

        <!-- 文章编辑面板 -->
        <div class="editor-form" id="editorPanel">
            <h3 style="font-size: 1.1rem; font-weight: 700; margin-bottom: 16px;">
                <span id="formTitle">新建文章</span>
            </h3>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">标题</label>
                    <input type="text" class="form-input" id="articleTitle" placeholder="输入文章标题">
                </div>
                <div class="form-group">
                    <label class="form-label">分类</label>
                    <select class="form-select" id="articleCategory">
                        <!-- 分类选项将通过JS生成 -->
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">摘要</label>
                <input type="text" class="form-input" id="articleExcerpt" placeholder="输入文章摘要">
            </div>

            <div class="form-group">
                <label class="form-label">内容</label>
                <div class="toolbar">
                    <button class="toolbar-btn" onclick="formatText('bold')" title="粗体">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M15.6 10.79c.97-.67 1.65-1.77 1.65-2.79 0-2.26-1.75-4-4-4H7v14h7.04c2.09 0 3.71-1.7 3.71-3.79 0-1.52-.86-2.82-2.15-3.42zM10 6.5h3c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-3v-3zm3.5 9H10v-3h3.5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5z"/></svg>
                    </button>
                    <button class="toolbar-btn" onclick="formatText('italic')" title="斜体">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M10 4v3h2.21l-3.42 8H6v3h8v-3h-2.21l3.42-8H18V4z"/></svg>
                    </button>
                    <div class="toolbar-separator"></div>
                    <button class="toolbar-btn" onclick="formatText('h2')" title="二级标题">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M5 4v3h5.5v12h3V7H19V4z"/></svg>
                    </button>
                    <button class="toolbar-btn" onclick="formatText('h3')" title="三级标题">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M5 4v3h5.5v12h3V7H19V4z" transform="scale(0.8)"/></svg>
                    </button>
                    <div class="toolbar-separator"></div>
                    <button class="toolbar-btn" onclick="insertLink()" title="链接">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
                    </button>
                    <button class="toolbar-btn" onclick="insertQuote()" title="引用">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M6 17h3l2-4V7H5v6h3zm8 0h3l2-4V7h-6v6h3z"/></svg>
                    </button>
                    <button class="toolbar-btn" onclick="insertList()" title="列表">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
                    </button>
                    <div class="toolbar-separator"></div>
                    <button class="toolbar-btn" onclick="insertImage()" title="图片">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                    </button>
                    <button class="toolbar-btn" onclick="insertVideo()" title="视频">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
                    </button>
                    <button class="toolbar-btn" onclick="insertAudio()" title="音频">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                    </button>
                </div>
                <div class="form-textarea content-editor" id="contentEditor" contenteditable="true" placeholder="在这里编写文章内容..."></div>
                <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 8px;">
                    支持 Markdown 格式。可插入图片、视频（URL）、音频（URL）
                </p>
            </div>

            <div class="form-group">
                <label class="form-label">标签（用逗号分隔）</label>
                <input type="text" class="form-input" id="articleTags" placeholder="如: 技术, 编程, 分享">
            </div>

            <div class="form-group" id="locationGroup" style="display: none;">
                <label class="form-label">地点（旅游分类用）</label>
                <input type="text" class="form-input" id="articleLocation" placeholder="如: 日本 · 京都">
            </div>

            <div class="form-actions">
                <button class="btn" onclick="saveArticle()">保存文章</button>
                <button class="btn btn-secondary" onclick="resetForm()">重置</button>
            </div>
        </div>

        <!-- 文章列表 -->
        <div class="articles-list">
            <div class="articles-list-header">
                <h2 class="section-title">文章列表</h2>
            </div>
            <div id="articlesList">
                <!-- 文章列表将通过JS生成 -->
            </div>
        </div>
    </main>

    <!-- 分类编辑模态框 -->
    <div class="modal-overlay" id="categoryModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">编辑分类</h3>
                <button class="modal-close" onclick="closeModal()">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                </button>
            </div>
            <div class="form-group">
                <label class="form-label">分类名称</label>
                <input type="text" class="form-input" id="editCategoryName">
            </div>
            <div class="form-group">
                <label class="form-label">描述</label>
                <input type="text" class="form-input" id="editCategoryDesc">
            </div>
            <div class="form-group">
                <label class="form-label">颜色</label>
                <div class="category-color-picker" id="colorPicker">
                    <div class="color-option" style="background: #6366f1" data-color="#6366f1"></div>
                    <div class="color-option" style="background: #10b981" data-color="#10b981"></div>
                    <div class="color-option" style="background: #3b82f6" data-color="#3b82f6"></div>
                    <div class="color-option" style="background: #8b5cf6" data-color="#8b5cf6"></div>
                    <div class="color-option" style="background: #f59e0b" data-color="#f59e0b"></div>
                    <div class="color-option" style="background: #ef4444" data-color="#ef4444"></div>
                    <div class="color-option" style="background: #ec4899" data-color="#ec4899"></div>
                    <div class="color-option" style="background: #06b6d4" data-color="#06b6d4"></div>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">背景图片URL</label>
                <input type="text" class="form-input" id="editCategoryBg" placeholder="https://...">
            </div>
            <div class="form-actions">
                <button class="btn" onclick="saveCategory()">保存</button>
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/config.js"></script>
    <script src="js/editor.js"></script>
</body>
</html>
