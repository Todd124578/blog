<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刘涛的博客</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Tao's Blog</a>
            <button class="menu-toggle" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html" class="active">首页</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero区域 -->
    <header class="hero">
        <div class="hero-decor hero-decor-1"></div>
        <div class="hero-decor hero-decor-2"></div>
        <div class="hero-content">
            <div class="hero-badge">
                <span>探索 · 思考 · 分享</span>
            </div>
            <h1 class="hero-title">记录<span>探索</span>与成长</h1>
            <p class="hero-subtitle" id="heroSubtitle">记录技术探索与生活感悟</p>
            <div class="social-links">
                <a href="#" class="social-link" aria-label="GitHub" id="socialGithub">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                </a>
                <a href="#" class="social-link" aria-label="Email">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                        <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                    </svg>
                </a>
                <a href="#" class="social-link" aria-label="Twitter">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                    </svg>
                </a>
            </div>
        </div>
        <div class="scroll-indicator">
            <span>向下滚动</span>
            <div class="scroll-arrow"></div>
        </div>
    </header>

    <!-- 文章列表 -->
    <main class="main-content">
        <section class="articles-section">
            <div class="section-header">
                <h2 class="section-title">最新文章</h2>
            </div>
            <div class="articles-grid" id="articles-grid">
                <!-- 文章将通过JS动态插入 -->
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 刘涛. All rights reserved.</p>
            <div class="footer-social">
                <a href="#">GitHub</a>
                <a href="#">Email</a>
                <a href="#">Twitter</a>
            </div>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script>
        // 动态加载配置到页面
        document.addEventListener('DOMContentLoaded', () => {
            // 更新博客标题
            document.title = config.blog.title;

            // 更新副标题
            document.getElementById('heroSubtitle').textContent = config.blog.subtitle;

            // 动态生成导航链接
            const navLinks = document.getElementById('navLinks');
            config.categories.forEach(cat => {
                const li = document.createElement('li');
                li.innerHTML = `<a href="${cat.slug}.html">${cat.name}</a>`;
                navLinks.appendChild(li);
            });

            // 添加关于链接
            const aboutLi = document.createElement('li');
            aboutLi.innerHTML = '<a href="about.html">关于</a>';
            navLinks.appendChild(aboutLi);
        });
    </script>
</body>
</html>
