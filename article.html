<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情 - 刘涛的博客</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;600&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Tao's Blog</a>
            <button class="menu-toggle" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="travel.html">旅游</a></li>
                <li><a href="work.html">工作</a></li>
                <li><a href="product.html">产品</a></li>
                <li><a href="life.html">生活</a></li>
                <li><a href="about.html">关于</a></li>
            </ul>
        </div>
    </nav>

    <!-- 文章内容 -->
    <main class="article-content">
        <article class="article-container" id="article-container">
            <!-- 文章内容将通过JS动态插入 -->
            <div class="loading">加载中...</div>
        </article>
    </main>

    <!-- 文章底部导航 -->
    <nav class="article-nav">
        <a href="index.html" class="back-home">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
            返回首页
        </a>
    </nav>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 刘涛. All rights reserved.</p>
            <div class="footer-social">
                <a href="#">GitHub</a>
                <a href="#">Email</a>
                <a href="#">Twitter</a>
            </div>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script>
        // 页面加载完成后渲染文章
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const articleId = params.get('id');
            if (articleId) {
                renderArticle(articleId);
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
